name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Build sdist/wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - uses: actions/upload-artifact@v4.6.1
        with:
          name: dist
          path: dist/

  github-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4.1.8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  update-homebrew:
    runs-on: ubuntu-latest
    needs: github-release
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4.2.2
        with:
          repository: Moduna-AI/qcp
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Compute GitHub Source URL and sha256
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Pulls the source code snapshot directly from your public GitHub release tag
          URL="https://github.com{VERSION}.tar.gz"
          
          echo "Fetching source tarball from GitHub..."
          curl -fsSL -o /tmp/qcp.tar.gz "$URL"
          
          SHA256=$(sha256sum /tmp/qcp.tar.gz | cut -d' ' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Update formula
        run: |
          sed -i "s|url \".*\"|url \"${{ steps.meta.outputs.url }}\"|" tap/Formula/qcp.rb
          sed -i "s|sha256 \".*\"|sha256 \"${{ steps.meta.outputs.sha256 }}\"|" tap/Formula/qcp.rb

      - name: Commit and push formula update
        working-directory: tap
        run: |
          git config user.name "qcp-release-bot"
          git config user.email "actions@github.com"
          git commit -am "qcp ${{ steps.meta.outputs.version }}" || echo "no changes"
          git push
