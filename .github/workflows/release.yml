name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Build sdist/wheel
        run: uv build

      - uses: actions/upload-artifact@v4.6.1
        with:
          name: dist
          path: dist/

  github-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4.1.8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  update-homebrew:
    runs-on: ubuntu-latest
    needs: github-release
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4.2.2
        with:
          repository: Moduna-AI/qcp
          ref: main
          token: ${{ github.token }}
          path: tap

      - name: Compute GitHub Source URL and sha256
        id: meta
        run: |
          V_TAG="${GITHUB_REF_NAME}"
          URL_STR="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${V_TAG}.tar.gz"
          echo "url=${URL_STR}" >> "$GITHUB_OUTPUT"

          curl --fail --location --show-error --silent --retry 3 \
            --output /tmp/qcp.tar.gz "${URL_STR}"
          SHA_OUT=$(sha256sum /tmp/qcp.tar.gz | cut -d' ' -f1)
          echo "sha256=${SHA_OUT}" >> "$GITHUB_OUTPUT"
          echo "version=${V_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Update formula
        run: |
          sed -i "s|url \".*\"|url \"${{ steps.meta.outputs.url }}\"|" tap/Formula/qcp.rb
          sed -i "s|sha256 \".*\"|sha256 \"${{ steps.meta.outputs.sha256 }}\"|" tap/Formula/qcp.rb

      - name: Commit and push formula update branch
        working-directory: tap
        run: |
          BRANCH_NAME="automation/homebrew-${GITHUB_REF_NAME}"
          git config user.name "qcp-release-bot"
          git config user.email "actions@github.com"
          if git diff --quiet; then
            echo "no changes"
            exit 0
          fi
          git switch -c "${BRANCH_NAME}"
          git commit -am "qcp ${{ steps.meta.outputs.version }}"
          git push --force origin "HEAD:${BRANCH_NAME}"
          PR_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/main...${BRANCH_NAME}?expand=1"
          echo "Open the Homebrew update PR: ${PR_URL}"
          echo "### Homebrew formula update" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open a pull request for ${GITHUB_REF_NAME}](${PR_URL})" >> "$GITHUB_STEP_SUMMARY"
