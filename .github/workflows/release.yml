name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - run: uv python install 3.14

      - name: Build sdist and wheel
        run: uv build

      - name: Test built package
        run: |
          ls -la dist
          uv venv /tmp/qcp-test --python 3.14
          uv pip install --python /tmp/qcp-test/bin/python dist/*.whl
          /tmp/qcp-test/bin/qcp --version

      - name: Compute sdist SHA256
        id: sha
        run: |
          echo "sdist=$(sha256sum dist/*.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4.6.1
        with:
          name: dist
          path: dist/

    outputs:
      sdist_sha: ${{ steps.sha.outputs.sdist }}

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  update-homebrew:
    runs-on: ubuntu-latest
    needs: [build, publish-pypi, github-release]
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: Moduna-AI/homebrew-qcp
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Rewrite formula
        env:
          VERSION_TAG: ${{ github.ref_name }}
          SDIST_SHA: ${{ needs.build.outputs.sdist_sha }}
        run: |
          python3 - <<'PYEOF'
          import os
          import textwrap

          tag = os.environ["VERSION_TAG"]
          version = tag.lstrip("v")
          sha = os.environ["SDIST_SHA"]

          formula = textwrap.dedent(f"""
          class Qcp < Formula
            include Language::Python::Virtualenv

            desc "Query Companion: query Postgres databases in natural language"
            homepage "https://github.com/Moduna-AI/qcp-cli"
            url "https://github.com/Moduna-AI/qcp-cli/releases/download/{tag}/qcp_cli-{version}.tar.gz"
            sha256 "{sha}"
            license "MIT"

            depends_on "python@3.14"

            def install
              system "python3.14", "-m", "venv", libexec
              system libexec/"bin/python", "-m", "pip", "install", "--upgrade", "pip"
              system libexec/"bin/python", "-m", "pip", "install", buildpath

              bin.install_symlink libexec/"bin/qcp"
            end

            test do
              system "#{{bin}}/qcp", "--version"
            end
          end
          """).lstrip()

          os.makedirs("tap/Formula", exist_ok=True)
          with open("tap/Formula/qcp.rb", "w") as f:
              f.write(formula)
          PYEOF

      - name: Commit and push
        working-directory: tap
        run: |
          git config user.name "qcp-release-bot"
          git config user.email "actions@github.com"
          git add Formula/qcp.rb
          git commit -m "qcp ${GITHUB_REF_NAME#v}" || exit 0
          git push origin main
          