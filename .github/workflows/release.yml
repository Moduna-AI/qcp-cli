name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write  # for PyPI trusted publishing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        run: uv python install 3.12

      - name: Build sdist and wheel
        run: uv build

      - name: Test built package
        run: |
          uv venv /tmp/qcp-test
          source /tmp/qcp-test/bin/activate
          uv pip install dist/*.whl
          qcp --version

      - uses: actions/upload-artifact@v4.6.1
        with:
          name: dist
          path: dist/

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    environment: release
    permissions:
      id-token: write # Required for PyPI Trusted Publishing OIDC
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write # Required to create a release and upload assets
    steps:
      - uses: actions/download-artifact@v4.1.8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  update-homebrew:
    runs-on: ubuntu-latest
    needs: publish-pypi
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: Moduna-AI/homebrew-qcp  # Points to your newly created repository
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Compute sdist URL and sha256
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE="qcp-cli"

          echo "Waiting for PyPI to publish sdist..."

          for i in $(seq 1 20); do
            JSON=$(curl -fsSL "https://pypi.org/pypi/$PACKAGE/$VERSION/json" || true)

            URL=$(echo "$JSON" | jq -r '.urls[] | select(.packagetype == "sdist") | .url' 2>/dev/null)
            SHA256=$(echo "$JSON" | jq -r '.urls[] | select(.packagetype == "sdist") | .digests.sha256' 2>/dev/null)

            if [ -n "$URL" ] && [ "$URL" != "null" ] && [ -n "$SHA256" ] && [ "$SHA256" != "null" ]; then
              echo "Found sdist on PyPI!"
              break
            fi

            echo "Still waiting for PyPI to index sdist... (Attempt $i/20)"
            sleep 30
          done

          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "Error: Timed out waiting for sdist on PyPI"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Update formula
        run: |
          sed -i "s|url \".*\"|url \"${{ steps.meta.outputs.url }}\"|" tap/Formula/qcp.rb
          sed -i "s|sha256 \".*\"|sha256 \"${{ steps.meta.outputs.sha256 }}\"|" tap/Formula/qcp.rb

      - name: Commit and push formula update
        working-directory: tap
        run: |
          git config user.name "qcp-release-bot"
          git config user.email "actions@github.com"
          git commit -am "qcp ${{ steps.meta.outputs.version }}" || echo "no changes"
          git push origin main

