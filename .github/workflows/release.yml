name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - run: uv python install 3.14

      - name: Build sdist and wheel
        run: uv build

      - name: Test built package
        run: |
          uv venv /tmp/qcp-test
          uv pip install --python /tmp/qcp-test/bin/python dist/*.whl
          /tmp/qcp-test/bin/qcp --version

      - uses: actions/upload-artifact@v4.6.1
        with:
          name: dist
          path: dist/

  build-binaries:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            artifact: qcp-macos-arm64
          - os: ubuntu-latest
            arch: x86_64
            artifact: qcp-linux-x86_64
          - os: windows-latest
            arch: x86_64
            artifact: qcp-windows-x86_64

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: astral-sh/setup-uv@v5

      - run: uv python install 3.14

      - name: Build binary
        run: uv run --with pyinstaller pyinstaller --onedir --name qcp-${{ matrix.arch }} qcp/cli.py

      - uses: actions/upload-artifact@v4.6.1
        with:
          name: qcp-macos-${{ matrix.arch }}
          path: dist/qcp-${{ matrix.arch }}

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    runs-on: ubuntu-latest
    needs: [build, build-binaries]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          pattern: qcp-macos-*
          merge-multiple: false
          path: binaries/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            binaries/qcp-macos-arm64/qcp-arm64
            binaries/qcp-macos-x86_64/qcp-x86_64
          generate_release_notes: true

  update-homebrew:
    runs-on: ubuntu-latest
    needs: github-release
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: qcp-macos-*
          merge-multiple: false
          path: binaries/

      - name: Compute SHA256s
        id: sha
        run: |
          echo "arm64=$(sha256sum binaries/qcp-macos-arm64/qcp-arm64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "x86_64=$(sha256sum binaries/qcp-macos-x86_64/qcp-x86_64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: Moduna-AI/homebrew-qcp
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Rewrite formula
        env:
          VERSION: ${{ github.ref_name }}
          ARM64_SHA: ${{ steps.sha.outputs.arm64 }}
          X86_SHA: ${{ steps.sha.outputs.x86_64 }}
        run: |
          python3 - <<'PYEOF'
          import os, textwrap
          tag = os.environ["VERSION"]
          version = tag.lstrip("v")
          arm64 = os.environ["ARM64_SHA"]
          x86 = os.environ["X86_SHA"]
          base = "https://github.com/Moduna-AI/qcp-cli/releases/download"
          formula = textwrap.dedent(f"""
            class Qcp < Formula
              desc "Query Companion: query Postgres databases in natural language"
              homepage "https://github.com/Moduna-AI/qcp-cli"
              version "{version}"

              on_macos do
                on_arm do
                  url "{base}/{tag}/qcp-arm64"
                  sha256 "{arm64}"
                end
                on_intel do
                  url "{base}/{tag}/qcp-x86_64"
                  sha256 "{x86}"
                end
              end

              def install
                bin.install Dir["qcp*"].first => "qcp"
              end

              test do
                assert_match version.to_s, shell_output("\#{bin}/qcp --version")
              end
            end
          """).lstrip()
          with open("tap/Formula/qcp.rb", "w") as f:
              f.write(formula)
          PYEOF

      - name: Commit and push
        working-directory: tap
        run: |
          git config user.name "qcp-release-bot"
          git config user.email "actions@github.com"
          git commit -am "qcp ${GITHUB_REF_NAME#v}"
          git push origin main