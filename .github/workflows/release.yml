name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write  # for PyPI trusted publishing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Build sdist/wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - uses: actions/upload-artifact@v4.6.1
        with:
          name: dist
          path: dist/

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Uses PyPI trusted publishing (OIDC) - no API token needed once the
      # PyPI project is configured to trust this repo/workflow.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4.1.8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  update-homebrew:
    runs-on: ubuntu-latest
    needs: publish-pypi
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: your-org/homebrew-qcp
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Compute sdist URL and sha256
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          URL="https://files.pythonhosted.org/packages/source/q/qcp-cli/qcp-cli-${VERSION}.tar.gz"
          echo "Waiting for PyPI to publish..."
          for i in $(seq 1 10); do
            if curl -fsSL -o /tmp/qcp-cli.tar.gz "$URL"; then break; fi
            sleep 15
          done
          SHA256=$(sha256sum /tmp/qcp-cli.tar.gz | cut -d' ' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Update formula
        run: |
          sed -i "s|url \".*\"|url \"${{ steps.meta.outputs.url }}\"|" tap/Formula/qcp.rb
          sed -i "s|sha256 \".*\"|sha256 \"${{ steps.meta.outputs.sha256 }}\"|" tap/Formula/qcp.rb

      - name: Commit and push formula update
        working-directory: tap
        run: |
          git config user.name "qcp-release-bot"
          git config user.email "actions@github.com"
          git commit -am "qcp ${{ steps.meta.outputs.version }}" || echo "no changes"
          git push
