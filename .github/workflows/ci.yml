name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install qcp + dev deps
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest -v

      - name: Run Ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

      - name: Smoke test CLI
        run: uv run qcp --version

      - name: Build sdist and wheel
        run: uv build

      - name: Test built wheel
        run: |
          uv venv .venv-wheel-test
          uv pip install --python .venv-wheel-test dist/*.whl
          uv run --python .venv-wheel-test qcp --version

      - name: Test built sdist
        run: |
          uv venv .venv-sdist-test
          uv pip install --python .venv-sdist-test dist/*.tar.gz
          uv run --python .venv-sdist-test qcp --version

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Build sdist and wheel
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/