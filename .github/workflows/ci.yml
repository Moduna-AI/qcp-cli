name: CI

# Runs on every commit pushed to main, and on every PR targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install qcp + dev deps
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run pytest -v

      - name: Run Ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

      - name: Smoke test CLI
        run: uv run qcp --version

      - name: Build sdist/wheel
        run: uv build

      - name: Test built wheel
        run: |
          uv venv qcp-wheel-test --python ${{ matrix.python-version }}
          uv pip install --python qcp-wheel-test dist/*.whl
          uv run --python qcp-wheel-test qcp --version

      - name: Test built sdist
        run: |
          uv venv qcp-sdist-test --python ${{ matrix.python-version }}
          uv pip install --python qcp-sdist-test dist/*.tar.gz
          uv run --python qcp-sdist-test qcp --version

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Install Python
        run: uv python install 3.14

      - name: Build sdist/wheel
        run: uv build

      - name: Test built wheel
        run: |
          uv venv /tmp/qcp-test --python 3.14
          uv pip install --python /tmp/qcp-test/bin/python dist/*.whl
          /tmp/qcp-test/bin/qcp --version

      - name: Test built sdist
        run: |
          uv venv /tmp/qcp-test-sdist --python 3.14
          uv pip install --python /tmp/qcp-test-sdist/bin/python dist/*.tar.gz
          /tmp/qcp-test-sdist/bin/qcp --version

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/